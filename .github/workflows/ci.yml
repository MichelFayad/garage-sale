name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Generate Prisma client so type info exists for typecheck.
      - run: pnpm --filter @garage-sale/db generate

      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  # The Flutter app (apps/mobile) is not a pnpm workspace member, so it's
  # invisible to the `verify` job above — it needs its own toolchain + gate.
  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - run: flutter pub get
      # --fatal-infos so style regressions (not just errors) fail CI, matching
      # the clean baseline. Drop it to --no-fatal-infos if that's too strict.
      - run: flutter analyze --fatal-infos
      - run: flutter test
